<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard - Tomasz Wiszniewski</title>
    <meta name="description" content="Nowoczesny dashboard kryptowalut zbudowany przez Tomasza Wiszniewskiego.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-inter min-h-screen">

    <!-- Background effects -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[30%] -left-[10%] w-[70%] h-[70%] rounded-full bg-purple-600/20 blur-[120px]"></div>
        <div class="absolute top-[20%] -right-[20%] w-[60%] h-[60%] rounded-full bg-blue-600/20 blur-[120px]"></div>
    </div>

    <!-- Container -->
    <div class="relative z-10 container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">Crypto Dashboard</h1>
                <p class="text-slate-400 text-sm mt-1">Real-time market data & analytics</p>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="glass-panel px-4 py-2 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-sm font-medium text-slate-300">Live API Connection</span>
                </div>
                <a href="https://wisnia.dev" class="text-sm text-slate-400 hover:text-white transition-colors underline">Portfolio</a>
            </div>
        </header>

        <!-- Top Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="market-overview">
            <!-- Loading Skeletons -->
            <div class="glass-panel p-5 rounded-2xl animate-pulse"><div class="h-10 bg-slate-700/50 rounded mb-2 w-1/2"></div><div class="h-6 bg-slate-700/50 rounded w-1/3"></div></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse"><div class="h-10 bg-slate-700/50 rounded mb-2 w-1/2"></div><div class="h-6 bg-slate-700/50 rounded w-1/3"></div></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse"><div class="h-10 bg-slate-700/50 rounded mb-2 w-1/2"></div><div class="h-6 bg-slate-700/50 rounded w-1/3"></div></div>
            <div class="glass-panel p-5 rounded-2xl animate-pulse"><div class="h-10 bg-slate-700/50 rounded mb-2 w-1/2"></div><div class="h-6 bg-slate-700/50 rounded w-1/3"></div></div>
        </div>

        <!-- Main Chart & Sidebar -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <!-- Chart Panel -->
            <div class="glass-panel p-6 rounded-3xl lg:col-span-2 relative min-h-[400px]">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-semibold">Bitcoin (BTC) Price History</h2>
                    <select id="chart-days" class="bg-slate-800/50 border border-slate-700 text-sm rounded-lg px-3 py-1 outline-none text-slate-200">
                        <option value="1">24h</option>
                        <option value="7" selected>7 Days</option>
                        <option value="30">30 Days</option>
                        <option value="365">1 Year</option>
                    </select>
                </div>
                <div class="w-full h-[300px]">
                    <canvas id="mainChart"></canvas>
                </div>
                <!-- Loading overlay -->
                <div id="chart-loader" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm rounded-3xl flex items-center justify-center hidden">
                    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>

            <!-- Top Coins List -->
            <div class="glass-panel p-6 rounded-3xl">
                <h2 class="text-xl font-semibold mb-6">Trending Coins</h2>
                <div id="trending-list" class="flex flex-col gap-4">
                    <!-- Loading Skeletons -->
                    <div class="flex items-center gap-3 animate-pulse"><div class="w-10 h-10 rounded-full bg-slate-700/50"></div><div class="flex-1"><div class="h-4 bg-slate-700/50 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-700/50 rounded w-1/3"></div></div></div>
                    <div class="flex items-center gap-3 animate-pulse"><div class="w-10 h-10 rounded-full bg-slate-700/50"></div><div class="flex-1"><div class="h-4 bg-slate-700/50 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-700/50 rounded w-1/3"></div></div></div>
                    <div class="flex items-center gap-3 animate-pulse"><div class="w-10 h-10 rounded-full bg-slate-700/50"></div><div class="flex-1"><div class="h-4 bg-slate-700/50 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-700/50 rounded w-1/3"></div></div></div>
                    <div class="flex items-center gap-3 animate-pulse"><div class="w-10 h-10 rounded-full bg-slate-700/50"></div><div class="flex-1"><div class="h-4 bg-slate-700/50 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-700/50 rounded w-1/3"></div></div></div>
                    <div class="flex items-center gap-3 animate-pulse"><div class="w-10 h-10 rounded-full bg-slate-700/50"></div><div class="flex-1"><div class="h-4 bg-slate-700/50 rounded w-1/2 mb-2"></div><div class="h-3 bg-slate-700/50 rounded w-1/3"></div></div></div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <footer class="text-center text-slate-500 text-sm mt-12 pb-4 border-t border-slate-800/50 pt-8">
            <p>Built with ❤️ by Tomasz Wiszniewski using pure JS & CoinGecko API.</p>
        </footer>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
