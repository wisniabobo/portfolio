<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saper - Tomasz Wiszniewski</title>
    <meta name="description" content="Klasyczna gra Saper w stylu Windows 95 z portfolio Tomasza Wiszniewskiego.">
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    <div class="desktop">
        <div class="window active-window" id="minesweeper">
            <div class="titlebar">
                <div class="titlebar-title">
                    <img src="https://win98icons.alexmeub.com/icons/mine-0.png" alt="Mine">
                    <span>Saper</span>
                </div>
                <div class="titlebar-controls">
                    <button class="tbtn">_</button>
                    <button class="tbtn">□</button>
                    <button class="tbtn close">X</button>
                </div>
            </div>
            
            <div class="menu-bar">
                <span>Gra</span>
                <span>Pomoc</span>
            </div>

            <div class="content">
                <div class="game-container">
                    <div class="game-header">
                        <div class="digital-display" id="mine-count">010</div>
                        <button class="face-btn" id="reset-btn">
                            <img src="https://win98icons.alexmeub.com/icons/face_smile-0.png" alt="Smile" id="face-img">
                        </button>
                        <div class="digital-display" id="timer">000</div>
                    </div>
                    
                    <div class="board-frame">
                        <div id="board" class="board">
                            <!-- Cells will be generated here -->
                        </div>
                    </div>
                </div>
                
                <div class="difficulty-controls">
                    <label><input type="radio" name="difficulty" value="easy" checked> Początkujący</label>
                    <label><input type="radio" name="difficulty" value="medium"> Średniozaawansowany</label>
                    <label><input type="radio" name="difficulty" value="hard"> Ekspert</label>
                </div>
                <div style="text-align: center; margin-top: 10px;">
                    <a href="https://wisnia.dev" class="back-link">Wróc do Portfolio (wisnia.dev)</a>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=1"></script>
</body>
</html>
