# wisnia.dev — nginx
# Deploy: ./deploy.sh --with-nginx (kopiuje do /etc/nginx/sites-enabled/wisnia.dev.conf)
server {
    server_name wisnia.dev www.wisnia.dev;

    root /var/www/html;
    index index.html;

    error_page 404 /404.html;

    # nagłówki bezpieczeństwa
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # statyki wersjonowane przez ?v= w deployu — można cache'ować długo
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/wisnia.dev/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wisnia.dev/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    listen 80;
    listen [::]:80;
    server_name wisnia.dev www.wisnia.dev;
    return 301 https://wisnia.dev$request_uri;
}
