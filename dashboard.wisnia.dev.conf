# dashboard.wisnia.dev — nginx
# Cert Let's Encrypt: subdomena objęta certyfikatem saper.wisnia.dev
# (SAN: saper.wisnia.dev, dashboard.wisnia.dev, prawo.wisnia.dev)
server {
    server_name dashboard.wisnia.dev;

    root /var/www/dashboard;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    listen 443 ssl;
    listen [::]:443 ssl;
    ssl_certificate /etc/letsencrypt/live/saper.wisnia.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/saper.wisnia.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.wisnia.dev;
    return 301 https://dashboard.wisnia.dev$request_uri;
}
